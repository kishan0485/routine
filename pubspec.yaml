name: routine
description: AI-powered daily life assistant for Indian users.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  firebase_storage: ^12.1.3

  # AI
  google_generative_ai: ^0.4.3

  # UI & Fonts
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  animate_do: ^3.3.4
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0

  # Utilities
  image_picker: ^1.1.2
  flutter_local_notifications: ^17.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.4.2
  cached_network_image: ^3.4.1

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
